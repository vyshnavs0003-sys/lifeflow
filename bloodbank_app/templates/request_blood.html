{% extends 'base.html' %}

{% block title %}
Request Blood
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">
        <div class="card form-card shadow-sm">
            <div class="card-body p-4">
                <h2 class="form-title text-center mb-3">
                    Blood Request Form
                </h2>
                <p class="text-muted text-center mb-4">
                    Submit a blood request to the selected hospital.
                </p>
                <form method="POST" class="lifeflow-form">

                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid mt-4">
                        <button
                            type="submit"
                            class="btn btn-danger"
                        >
                            Submit Request
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
