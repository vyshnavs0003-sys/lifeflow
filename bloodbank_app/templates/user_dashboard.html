{% extends 'base.html' %}

{% block content %}
<h1>User Dashboard</h1>
<p>Welcome, {{ user.first_name }}</p>
<p>Username: {{ user.username }}</p>
<p>Email: {{ user.email }}</p>
<hr>


{% if is_donor %}
    <a href="{% url 'donor_profile' %}">
        View Donor Profile
    </a>
{% else %}
    <a href="{% url 'become_donor' %}">
        Become a Donor
    </a>
{% endif %}
{% endblock %}
